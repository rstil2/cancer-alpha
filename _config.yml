theme: jekyll-theme-cayman

title: "Oncura"
description: "Multi-modal TCGA cancer classification — reproducible research code (Study 2: 98.4% balanced accuracy, n=1,248)"
url: "https://rstil2.github.io"
baseurl: "/cancer-alpha"

# Exclude non-web files from the Jekyll build
exclude:
  - "*.py"
  - "*.sh"
  - "*.bat"
  - "*.zip"
  - "*.pkl"
  - "*.json"
  - "*.docx"
  - "*.csv"
  - "*.tsv"
  - "*.joblib"
  - models/
  - demo/
  - scripts/
  - src/
  - data/
  - notebooks/
  - archive/
  - requirements.txt
  - Dockerfile
  - docker-compose.yml
  - setup.py
  - Gemfile
  - Gemfile.lock
