name: Build native demo apps

on:
  push:
    branches: [main]
    paths:
      - "demo/**"
      - ".github/workflows/demo-native.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build Oncura Demo.app
        run: |
          cd demo
          pip install -r requirements_build.txt
          python build_native.py
      - name: Upload Mac app
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view demo --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create demo \
              --repo "${{ github.repository }}" \
              --title "Oncura Demo" \
              --notes "## Mac\n1. Download **Oncura-Demo-mac.zip**\n2. Unzip\n3. Double-click **Oncura Demo**\n4. If Mac blocks it the first time only: right-click the app → **Open** → **Open**\n\n## Windows\n1. Download **Oncura-Demo-Windows.exe**\n2. Double-click to run\n\nNo Python. No Terminal. Research demo only — not for clinical use."
          gh release upload demo dist/Oncura-Demo-mac.zip \
            --repo "${{ github.repository }}" \
            --clobber

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build Oncura Demo.exe
        shell: bash
        run: |
          cd demo
          pip install -r requirements_build.txt
          python build_native.py
      - name: Upload Windows exe
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view demo --repo "${{ github.repository }}" >/dev/null 2>&1 || \
            gh release create demo \
              --repo "${{ github.repository }}" \
              --title "Oncura Demo Download" \
              --notes "Native desktop apps — see Mac/Windows assets."
          gh release upload demo dist/Oncura-Demo-Windows.exe \
            --repo "${{ github.repository }}" \
            --clobber
